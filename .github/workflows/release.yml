name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install -U pip build
      - name: Build
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish → PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/project/agentic-engine/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Extract changelog section
        id: cl
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          v="${tag#v}"
          awk -v v="$v" '
            /^## \[/ { if (collecting) { exit }; if ($0 ~ "\\["v"\\]") { collecting=1; next } }
            collecting { print }
          ' CHANGELOG.md > release_notes.md || echo "(see CHANGELOG.md)" > release_notes.md
      - name: gh release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "${GITHUB_REF#refs/tags/}" \
            --notes-file release_notes.md \
            dist/*
